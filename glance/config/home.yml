            - title: Immich
              # url: http://192.168.0.254:2283/
              url: https://immich.thehill.top/
              icon: /assets/immich.png
              alt-status-codes:
                - 401

            - title: Pi Hole
              # url: http://192.168.0.254:808/admin/
              url: https://pihole.thehill.top/admin/
              icon: /assets/pi-hole.png
              alt-status-codes:
                - 401

            - title: Gatus
              # url: http://192.168.0.254:2116/
              url: https://status.thehill.top/
              icon: /assets/gatus.png
              alt-status-codes:
                - 401

            - title: Media Manager  
              # url: http://192.168.0.254:8001/
              url: https://mm.thehill.top/
              icon: /assets/media-manager.png
              alt-status-codes:
                - 401

            - title: Jellyfin
              # url: http://192.168.0.254:8001/
              url: https://jellyfin.thehill.top/
              icon: /assets/jellyfin.png
              alt-status-codes:
                - 401

            # - title: NextCloud
            #   # url: http://192.168.0.254:8082/
            #   url: https://nc.thehill.top/
            #   icon: /assets/jellyfin.png
            #   alt-status-codes:
            #     - 401

            - title: Beszel
              url: https://beszel.thehill.top/
              icon: /assets/beszel.png
              alt-status-codes:
                - 401

            - title: Ntfy
              url: https://ntfy.thehill.top/
              icon: /assets/ntfy.png
              alt-status-codes:
                - 401

            - title: Syncthing
              url: https://syncthing.thehill.top/
              icon: /assets/syncthing.png
              alt-status-codes:
                - 401

            - title: TinyAuth
              url: https://auth.thehill.top/
              icon: /assets/tinyauth.png
              alt-status-codes:
                - 401

        - type: monitor
          cache: 10m
          title: Media
          sites:
            - title: Prowlarr
              url: http://192.168.0.254:9696/
              icon: /assets/prowlarr.png

            - title: Radarr
              url: http://192.168.0.254:7878/
              icon: /assets/radarr.png

            - title: Bazarr
              url: http://192.168.0.254:6767/
              icon: /assets/bazarr.png

            - title: Seerr
              url: http://192.168.0.254:5055/
              icon: /assets/seerr.png

            - title: qBittorrent
              url: http://192.168.0.254:1702/
              icon: /assets/qbittorrent.png

        - type: server-stats
          servers:
            - type: local
              name: Services
