services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      # Note: $ is doubled to $$ for docker-compose
      TZ: "Sydney/Australia"    # optional: set desired timezone
      NTFY_BASE_URL: "https://ntfy.thehill.top"
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_FILE: "/var/lib/ntfy/auth.db"
      NTFY_AUTH_DEFAULT_ACCESS: "deny-all"
      NTFY_ENABLE_LOGIN: "true"
      NTFY_REQUIRE_LOGIN: "true"
      NTFY_AUTH_USERS: "ntfyadmin:$$2a$$12$$3NqhVNUw65v/hx531nFJX.kXZhkEyTF2hWdwsWHC7bCwW0LXFd6Ou:admin,ntfyuser:$$2a$$12$$SoF9NUn5G0KDh/ctsJei/u7mbkzWaH2hLC/ufi77FWP53ruDkXOUS:user"
    # user: UID:GID # optional: replace with your own user/group or uid/gid
    volumes:
      - /var/lib/ntfy:/var/lib/ntfy 
      - /var/cache/ntfy:/var/cache/ntfy
      - /etc/ntfy:/etc/ntfy
    ports:
      - 8083:80
    healthcheck: # optional: remember to adapt the host:port to your environment
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:8083/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    restart: unless-stopped
    init: true # needed, if healthcheck is used. Prevents zombie processes

