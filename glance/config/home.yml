- name: Monitor
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: dns-stats
          service: pihole-v6
          url: http://192.168.0.254:808/
          username: pi.hole
          password: ${PIHOLE_PASSWORD}
    - size: full 
      widgets:
        - type: monitor
          cache: 10m
          title: Services
          sites:
